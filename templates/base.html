<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OuiOui — {% block title %}{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥖</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        function speak(word) {
            const u = new SpeechSynthesisUtterance(word);
            u.lang = 'fr-FR';
            u.rate = 0.9;
            speechSynthesis.speak(u);
        }
    </script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
        .fade-out { opacity: 0; transition: opacity 300ms ease; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">
    <nav class="bg-white border-b border-stone-200 sticky top-0 z-10">
        <div class="max-w-2xl mx-auto px-6 py-3 flex items-center gap-6">
            <a href="/" class="text-lg font-bold text-indigo-600">&#129366; OuiOui</a>
            <div class="flex gap-4 text-sm">
                <a href="/search" class="hover:text-indigo-600 transition-colors">Chercher</a>
                <a href="/vocab" class="hover:text-indigo-600 transition-colors">Vocabulaire</a>
                <a href="/expressions" class="hover:text-indigo-600 transition-colors">Expressions</a>
                <a href="/quiz" class="hover:text-indigo-600 transition-colors">Quiz</a>
            </div>
        </div>
    </nav>
    <main class="max-w-2xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
