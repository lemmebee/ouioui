{% extends "base.html" %}
{% block title %}Expressions{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Expressions <span class="text-stone-400 font-normal text-lg">({{ expressions|length }})</span></h1>

<form hx-post="/api/expressions" hx-target="#expression-list" hx-swap="innerHTML" hx-on::after-request="if(event.detail.successful) this.reset()"
      class="bg-white rounded-xl border border-stone-200 p-4 mb-6 space-y-3">
    <div>
        <input type="text" name="french" placeholder="Expression en francais" required
               class="w-full px-3 py-2 border border-stone-200 rounded-lg text-sm focus:outline-none focus:border-indigo-400">
    </div>
    <div>
        <input type="text" name="english" placeholder="English meaning" required
               class="w-full px-3 py-2 border border-stone-200 rounded-lg text-sm focus:outline-none focus:border-indigo-400">
    </div>
    <div>
        <input type="text" name="note" placeholder="Note (optionnel)"
               class="w-full px-3 py-2 border border-stone-200 rounded-lg text-sm focus:outline-none focus:border-indigo-400">
    </div>
    <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">
        Ajouter
    </button>
</form>

<div class="space-y-3" id="expression-list">
    {% include "partials/expression_list.html" %}
</div>
{% endblock %}
